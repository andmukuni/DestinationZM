# docker-compose.yml — DestinationZM production stack
#
# Usage:
#   docker compose up -d           # start app (Coolify / external MySQL + Redis)
#   docker compose build           # rebuild image after code changes
#   docker compose logs -f app     # follow web server logs
#
# Local with host port:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# For Coolify:
#   No host port binding — Coolify proxy routes to expose:3333.
#   Create MySQL and Redis resources separately (or use external hosts), then set
#   DB_HOST / REDIS_HOST in Coolify environment variables (runtime only).
#
# For standalone (non-Coolify):
#   Uncomment the db and redis services at the bottom, set
#   DB_HOST=db and REDIS_HOST=redis in your .env, then run:
#     docker compose --env-file .env up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: destination-zm:latest
    restart: unless-stopped
    expose:
      - '3333'
    volumes:
      - app_storage:/app/storage
      - app_tmp:/app/tmp
    environment:
      APP_NAME: ${APP_NAME:-DestinationZM}
      APP_ENV: ${APP_ENV:-production}
      PORT: '3333'
      HOST: 0.0.0.0
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      # Database (MySQL)
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3310}
      DB_USERNAME: ${DB_USERNAME:-mysql}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_DATABASE: ${DB_DATABASE:-default}
      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Coolify (optional — app falls back SERVICE_URL_APP → APP_URL)
      SERVICE_URL_APP: ${SERVICE_URL_APP:-}
      SERVICE_FQDN_APP: ${SERVICE_FQDN_APP:-}
      # Mail (Till360-style names; mapped in start/env.ts)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-DestinationZM}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-DestinationZM}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3333/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Worker — enable after Adonis queue package + ace queue:work are added.
  # worker:
  #   image: destination-zm:latest
  #   restart: unless-stopped
  #   depends_on:
  #     app:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ['CMD', 'pgrep', '-f', 'ace queue:work']
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 20s
  #   environment:
  #     ROLE: worker
  #     NODE_ENV: production
  #     HOST: 0.0.0.0
  #     PORT: '3333'
