  #     DB_PASSWORD: ${DB_PASSWORD:-}
  #     DB_DATABASE: ${DB_DATABASE:-default}
  #     REDIS_HOST: ${REDIS_HOST}
  #     REDIS_PORT: ${REDIS_PORT:-6379}
  #     REDIS_USERNAME: ${REDIS_USERNAME:-default}
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-}

volumes:
  app_storage:
  app_tmp:

